<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Mahmoud Ahmed Abdallah - Full-stack developer, Agentic AI instructor, and creative media professional building premium digital products and brand systems." />
  <meta name="theme-color" content="#0a0b10" />
  <title>Mahmoud Ahmed Abdallah | Full-Stack Developer, AI Instructor, Creative Media Professional</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#07080c;
      --bg2:#0c1017;
      --surface:rgba(255,255,255,.038);
      --surface-2:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.085);
      --line-2:rgba(255,255,255,.13);
      --text:#eef2f7;
      --muted:#aab4c1;
      --soft:#7d8795;
      --accent:#8f78c8;
      --accent-2:#8ab3ff;
      --shadow:0 18px 52px rgba(0,0,0,.28);
      --radius:22px;
      --radius-sm:16px;
      --max:1280px;
      --font-display:"Cairo","IBM Plex Sans Arabic",sans-serif;
      --font-body:"IBM Plex Sans Arabic","Cairo",sans-serif;
      --font-mono:"IBM Plex Mono", ui-monospace, monospace;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      color:var(--text);
      font-family:var(--font-body);
      background:
        radial-gradient(circle at top left, rgba(143,120,200,.14), transparent 26%),
        radial-gradient(circle at top right, rgba(123,212,232,.10), transparent 22%),
        linear-gradient(180deg, #05070b 0%, #080b10 35%, #090d12 100%);
      overflow-x:hidden;
    }
    img,video{display:block;max-width:100%}
  </style>
</head>
<body>
  <main>
    <section class="hero" id="hero">
      <div class="container hero-grid reveal">
        <aside class="profile-card panel">
          <div class="profile-media">
            <img id="portrait-img" alt="Mahmoud Ahmed Abdallah portrait" loading="eager" src="assets/portrait/mahmoud-removebg-preview.png" />
            <div class="profile-overlay">
              <h3>Mahmoud Ahmed Abdallah</h3>
              <p>Full-Stack Developer, Agentic AI Instructor, and creative media professional.</p>
            </div>
          </div>
        </aside>
      </div>
    </section>

    <section class="section" id="about">
      <div class="container reveal">
        <aside class="about-side panel">
          <div class="profile-card" style="padding:0">
            <div class="profile-media" style="min-height:280px">
              <img src="assets/portrait/mahmoud-removebg-preview.png" alt="Professional portrait" loading="lazy" />
              <div class="profile-overlay">
                <h3>Brand portrait</h3>
                <p>Used consistently across the site.</p>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script src="mahmoud_portfolio_data.js"></script>
  <script>
    // Load images from data file
    const portraitImg = document.getElementById('portrait-img');
    if (portraitImg && window.PORTFOLIO_MEDIA) {
      portraitImg.src = window.PORTFOLIO_MEDIA.portrait;
    }
  </script>
</body>
</html>
